_security_logout:
    resource: security.route_loader.logout
    type: service
    
security:
  password_hashers:
    App\Entity\User:
      algorithm: auto

  providers:
    app_user_provider:
      entity:
        class: App\Entity\User
        property: email

  firewalls:
    main:
      lazy: true
      provider: app_user_provider
      form_login:
        login_path: app_login
        check_path: app_login
        default_target_path: app_feed
      logout:
        path: app_logout
        target: app_main

  access_control:
    - { path: ^/feed, roles: ROLE_USER }
    - { path: ^/auth, roles: PUBLIC_ACCESS }